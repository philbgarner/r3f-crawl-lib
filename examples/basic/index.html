<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>r3f-crawl-lib — Basic Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; height: 100vh; }

    #sidebar {
      width: 260px;
      flex-shrink: 0;
      padding: 16px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar h1 { font-size: 14px; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; }

    #log {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      color: #bbb;
    }
    #log .entry         { padding: 2px 0; border-bottom: 1px solid #222; }
    #log .entry.damage  { color: #f66; }
    #log .entry.death   { color: #f99; font-weight: bold; }
    #log .entry.audio   { color: #69f; }
    #log .entry.turn    { color: #555; }

    #stats {
      font-size: 12px;
      line-height: 2;
      color: #ccc;
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    #stats span { color: #fff; font-weight: bold; }

    #controls {
      font-size: 11px;
      color: #666;
      border-top: 1px solid #333;
      padding-top: 10px;
      line-height: 1.8;
    }

    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    #map {
      font-size: 13px;
      line-height: 1.3;
      letter-spacing: 0.08em;
      white-space: pre;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>r3f-crawl-lib</h1>
    <div id="stats">
      HP: <span id="hp">—</span><br>
      Turn: <span id="turn">0</span><br>
      Pos: <span id="pos">—</span>
    </div>
    <div id="log"></div>
    <div id="controls">
      WASD / Arrow keys — move<br>
      Q / E — turn left / right<br>
      Space — wait
    </div>
  </div>

  <div id="canvas-wrap">
    <pre id="map"></pre>
  </div>

  <!-- Three.js must be loaded as a global before the library -->
  <script src="https://unpkg.com/three@0.183.2/build/three.min.js"></script>
  <script src="../../dist/r3f-crawl-lib.iife.js"></script>
  <script src="basic.js"></script>
</body>
</html>
