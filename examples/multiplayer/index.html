<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>r3f-crawl-lib — Multiplayer Example</title>
  <link rel="stylesheet" href="/examples/basic/styles.css" />
  <style>
    #connect-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(10, 10, 26, 0.92);
    }
    #connect-box {
      background: #10102a;
      border: 3px solid #304080;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #c8d0f8;
      min-width: 300px;
      box-shadow: 0 0 40px rgba(48,64,128,0.6);
    }
    #connect-box h2 { color: #f0c040; font-size: 10px; margin-bottom: 4px; }
    #connect-box label { color: #8090c0; }
    #connect-box input {
      background: #0a0a1a;
      border: 2px solid #304080;
      color: #c8d0f8;
      font-family: inherit;
      font-size: 9px;
      padding: 6px 8px;
      width: 100%;
    }
    #connect-box button {
      background: #304080;
      border: 2px solid #f0c040;
      color: #f0c040;
      font-family: inherit;
      font-size: 9px;
      padding: 8px 12px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #connect-box button:hover { background: #405090; }
    #status-tag {
      font-size: 7px;
      color: #8090c0;
      border-top: 1px solid #304080;
      padding-top: 10px;
    }
    #connect-error { color: #f66; font-size: 8px; display: none; }
    #player-count { color: #69f; }
  </style>
</head>
<body>
  <!-- Connection splash shown before the WebSocket handshake completes -->
  <div id="connect-screen">
    <div id="connect-box">
      <h2>MULTIPLAYER</h2>
      <label>Server URL</label>
      <input id="server-url" type="text" value="ws://localhost:3001" />
      <button id="connect-btn">Connect</button>
      <div id="connect-error"></div>
      <div id="status-tag">First player to join becomes the host and generates the dungeon.</div>
    </div>
  </div>

  <div id="sidebar">
    <h1>multiplayer</h1>
    <div id="stats">
      HP: <span id="hp">—</span><br>
      Turn: <span id="turn">0</span><br>
      Pos: <span id="pos">—</span><br>
      Players: <span id="player-count">1</span>
    </div>
    <div id="log"></div>
    <div id="controls">
      WASD / Arrow keys — move<br>
      Q / E — turn left / right<br>
      Space — wait
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="viewport"></div>
  </div>

  <script type="module">
    import * as THREE from '/node_modules/three/build/three.module.js';
    window.THREE = THREE;
  </script>
  <script src="/dist/r3f-crawl-lib.iife.js" defer></script>
  <script src="/examples/multiplayer/multiplayer.js" defer></script>
</body>
</html>
