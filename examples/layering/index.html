<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atomic-core — Layering Example</title>
  <link rel="stylesheet" href="../basic/styles.css" />
</head>
<body>
  <div id="sidebar">
    <h1>layering</h1>
    <div id="stats">
      HP: <span id="hp">—</span><br>
      Turn: <span id="turn">0</span><br>
      Pos: <span id="pos">—</span>
    </div>
    <div id="log"></div>
    <div id="controls">
      WASD / Arrow keys — move<br>
      Q / E — turn left / right<br>
      Space — wait<br>
      <br>
      Ceiling height varies<br>
      by distance to wall.<br>
      Open rooms have pits.
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="viewport"></div>
  </div>

  <!-- Expose THREE as a global from the local ESM build -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js';
    window.THREE = THREE;
  </script>
  <script src="../basic/atlas-data.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/philbgarner/atomic-core@v0.3.0/dist/atomic-core.iife.js" defer></script>
  <script src="./layering.js" defer></script>
</body>
</html>
