<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atomic-core — Multiplayer Example</title>
  <link rel="stylesheet" href="../basic/styles.css" />
  <style>
    #connect-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(10, 10, 26, 0.92);
    }
    #connect-box {
      background: #10102a;
      border: 3px solid #304080;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #c8d0f8;
      min-width: 300px;
      box-shadow: 0 0 40px rgba(48,64,128,0.6);
    }
    #connect-box h2 { color: #f0c040; font-size: 10px; margin-bottom: 4px; }
    #connect-box label { color: #8090c0; }
    #connect-box input {
      background: #0a0a1a;
      border: 2px solid #304080;
      color: #c8d0f8;
      font-family: inherit;
      font-size: 9px;
      padding: 6px 8px;
      width: 100%;
    }
    #connect-box button {
      background: #304080;
      border: 2px solid #f0c040;
      color: #f0c040;
      font-family: inherit;
      font-size: 9px;
      padding: 8px 12px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #connect-box button:hover { background: #405090; }
    #status-tag {
      font-size: 7px;
      color: #8090c0;
      border-top: 1px solid #304080;
      padding-top: 10px;
    }
    #connect-error { color: #f66; font-size: 8px; display: none; }
    #player-count { color: #69f; }

    /* Sprite selector */
    #sprite-select { display: flex; gap: 12px; flex-wrap: wrap; }
    .sprite-opt { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .sprite-opt input[type="radio"] { accent-color: #f0c040; cursor: pointer; }

    /* Minimap overlay */
    #minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 196px;
      height: 196px;
      border: 2px solid #304080;
      background: #000;
      box-shadow: 0 0 0 1px #000, 0 0 12px rgba(0,0,0,0.8);
      image-rendering: pixelated;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Player list ─────────────────────────────────────────────────────── */
    #player-list-section {
      border-top: 1px solid #304080;
      padding-top: 12px;
    }
    .section-label {
      font-size: 7px;
      color: #8090c0;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    #player-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 7px;
      line-height: 1.7;
      max-height: 110px;
      overflow-y: auto;
    }
    .player-entry        { color: #c8d0f8; }
    .player-entry.self   { color: #f0c040; }
    .player-entry.dead   { color: #f66; text-decoration: line-through; opacity: 0.6; }
    .player-entry.server { color: #8090c0; font-style: italic; }

    /* ── Chat overlay (non-interactive, bottom of viewport) ──────────────── */
    #chat-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      pointer-events: none;
      display: flex;
      flex-direction: column-reverse;
      gap: 3px;
      max-height: 35%;
      overflow: hidden;
      z-index: 10;
    }
    .chat-msg {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #c8d0f8;
      text-shadow: 1px 1px 0 #000, -1px 1px 0 #000,
                   1px -1px 0 #000, -1px -1px 0 #000;
      background: rgba(10, 10, 26, 0.55);
      padding: 3px 8px;
      border-left: 2px solid #304080;
      width: fit-content;
      max-width: 100%;
      word-break: break-word;
      animation: chat-fadeout 6s forwards;
    }
    .chat-msg.server-msg { border-left-color: #8090c0; color: #8090c0; }
    @keyframes chat-fadeout {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Chat input modal ────────────────────────────────────────────────── */
    #chat-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 56px;
      z-index: 200;
      background: rgba(0, 0, 0, 0.25);
    }
    #chat-box {
      background: #10102a;
      border: 2px solid #304080;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 520px;
      max-width: 90vw;
      box-shadow: 0 0 32px rgba(48, 64, 128, 0.9);
    }
    #chat-input {
      background: #0a0a1a;
      border: 2px solid #304080;
      color: #c8d0f8;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 8px;
      width: 100%;
      outline: none;
    }
    #chat-input:focus { border-color: #f0c040; }
    #chat-send {
      background: #304080;
      border: 2px solid #f0c040;
      color: #f0c040;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 6px 14px;
      cursor: pointer;
      align-self: flex-end;
    }
    #chat-send:hover { background: #405090; }
    #chat-hint { font-size: 7px; color: #404060; font-family: 'Press Start 2P', monospace; }

    /* Turn-animation floating text */
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0); }
      15%  { opacity: 1; transform: translateY(-30px); }
      45%  { opacity: 1; transform: translateY(-37px); }
      100% { opacity: 0; transform: translateY(-52px); }
    }
    .anim-float {
      position: absolute;
      pointer-events: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      text-shadow: 1px 1px 0 #000, -1px 1px 0 #000,
                   1px -1px 0 #000, -1px -1px 0 #000;
      animation: float-up 0.9s linear forwards;
      z-index: 20;
    }
  </style>
</head>
<body>
  <!-- Connection splash shown before the WebSocket handshake completes -->
  <div id="connect-screen">
    <div id="connect-box">
      <h2>MULTIPLAYER</h2>
      <label>Server URL</label>
      <input id="server-url" type="text" value="ws://localhost:3001" />
      <label>Your sprite</label>
      <div id="sprite-select">
        <label class="sprite-opt"><input type="radio" name="sprite" value="rogue" checked> Rogue</label>
        <label class="sprite-opt"><input type="radio" name="sprite" value="warrior"> Warrior</label>
        <label class="sprite-opt"><input type="radio" name="sprite" value="mage"> Mage</label>
      </div>
      <button id="connect-btn">Connect</button>
      <div id="connect-error"></div>
      <div id="status-tag">First player to join becomes the host and generates the dungeon.</div>
    </div>
  </div>

  <div id="sidebar">
    <h1>multiplayer</h1>
    <div id="stats">
      HP: <span id="hp">—</span><br>
      Turn: <span id="turn">0</span><br>
      Pos: <span id="pos">—</span>
    </div>
    <div id="player-list-section">
      <div class="section-label">PLAYERS (<span id="player-count">0</span>)</div>
      <div id="player-list"></div>
    </div>
    <div id="log"></div>
    <div id="controls">
      WASD / Arrow keys — move<br>
      Q / E — turn left / right<br>
      Space — wait<br>
      Enter — chat
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="viewport"></div>
    <canvas id="minimap" width="196" height="196"></canvas>

    <!-- Chat messages overlay — pointer-events: none so the 3D viewport stays interactive -->
    <div id="chat-overlay"></div>
  </div>

  <!-- Chat input modal — shown when player presses Enter -->
  <div id="chat-modal">
    <div id="chat-box">
      <input id="chat-input" type="text" maxlength="200" placeholder="Say something..." autocomplete="off" />
      <button id="chat-send">SEND</button>
      <div id="chat-hint">ENTER to send &nbsp;·&nbsp; ESC to cancel</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js';
    window.THREE = THREE;
  </script>
  <script src="../../../dist/atomic-core.iife.js" defer></script>
  <script src="./multiplayer.js" defer></script>
</body>
</html>
